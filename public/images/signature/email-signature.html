<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Signature – Max Isakov</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:transparent;">

<!-- ── Email Signature ── -->
<table cellpadding="0" cellspacing="0" border="0" style="font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:#333333;max-width:480px;background:transparent;">

  <!-- ─── Name + Credentials ─── -->
  <tr>
    <td style="padding:0 0 1px 0;">
      <span style="font-size:15px;font-weight:600;color:#333333;letter-spacing:0.2px;">Max Isakov</span><span style="font-size:13px;font-weight:400;color:#777777;">, RA, AIA, NCARB</span>
    </td>
  </tr>

  <!-- ─── Title ─── -->
  <tr>
    <td style="padding:0 0 8px 0;">
      <span style="font-size:12px;font-weight:500;color:#777777;letter-spacing:0.8px;text-transform:uppercase;">Principal</span>
    </td>
  </tr>

  <!-- ─── Phone ─── -->
  <tr>
    <td style="padding:2px 0;">
      <table cellpadding="0" cellspacing="0" border="0"><tr>
        <td style="vertical-align:middle;padding-right:8px;line-height:0;">
          <img src="https://www.maxaec.com/images/signature/icon-phone.png" alt="" width="14" height="14" style="display:block;border:0;" />
        </td>
        <td style="vertical-align:middle;">
          <a href="tel:+19174003123" style="font-size:13px;color:#333333;text-decoration:none;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">917.400.3123</a>
        </td>
      </tr></table>
    </td>
  </tr>

  <!-- ─── Email ─── -->
  <tr>
    <td style="padding:2px 0;">
      <table cellpadding="0" cellspacing="0" border="0"><tr>
        <td style="vertical-align:middle;padding-right:8px;line-height:0;">
          <img src="https://www.maxaec.com/images/signature/icon-email.png" alt="" width="14" height="14" style="display:block;border:0;" />
        </td>
        <td style="vertical-align:middle;">
          <a href="mailto:max@maxaec.com" style="font-size:13px;color:#333333;text-decoration:none;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">max@maxaec.com</a>
        </td>
      </tr></table>
    </td>
  </tr>

  <!-- ─── Website ─── -->
  <tr>
    <td style="padding:2px 0 0 0;">
      <table cellpadding="0" cellspacing="0" border="0"><tr>
        <td style="vertical-align:middle;padding-right:8px;line-height:0;">
          <img src="https://www.maxaec.com/images/signature/icon-globe.png" alt="" width="14" height="14" style="display:block;border:0;" />
        </td>
        <td style="vertical-align:middle;">
          <a href="https://www.maxaec.com" style="font-size:13px;color:#333333;text-decoration:none;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">www.maxaec.com</a>
        </td>
      </tr></table>
    </td>
  </tr>

  <!-- ─── Divider ─── -->
  <tr>
    <td style="padding:10px 0 10px 0;">
      <table cellpadding="0" cellspacing="0" border="0" width="100%"><tr>
        <td style="border-top:1px solid #e0e0e0;font-size:0;line-height:0;">&nbsp;</td>
      </tr></table>
    </td>
  </tr>

  <!-- ─── Logo lockup  (mark | divider | wordmark) ─── -->
  <tr>
    <td style="padding:0 0 4px 0;">
      <a href="https://www.maxaec.com" style="text-decoration:none;">
        <img src="https://www.maxaec.com/images/signature/lockup.png" alt="MAX AEC LLC" width="199" height="36" style="display:block;border:0;background:transparent;" />
      </a>
    </td>
  </tr>

  <!-- ─── Tagline ─── -->
  <tr>
    <td style="padding:0;">
      <span style="font-size:8px;font-weight:400;color:#777777;letter-spacing:0.46px;text-transform:uppercase;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">Architecture · Engineering · Consulting</span>
    </td>
  </tr>

</table>
<!-- ── /Email Signature ── -->

</body>
</html>
