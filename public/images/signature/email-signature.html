<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Signature – Max Isakov</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#ffffff;">

<!-- ── Email Signature ── -->
<table cellpadding="0" cellspacing="0" border="0" style="font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:#333333;max-width:480px;">

  <!-- ─── Name + Credentials ─── -->
  <tr>
    <td style="padding:0 0 1px 0;">
      <span style="font-size:15px;font-weight:600;color:#333333;letter-spacing:0.2px;">Max Isakov</span><span style="font-size:13px;font-weight:400;color:#777777;">, RA, AIA, NCARB</span>
    </td>
  </tr>

  <!-- ─── Title ─── -->
  <tr>
    <td style="padding:0 0 12px 0;">
      <span style="font-size:12px;font-weight:500;color:#777777;letter-spacing:0.8px;text-transform:uppercase;">Principal</span>
    </td>
  </tr>

  <!-- ─── Phone ─── -->
  <tr>
    <td style="padding:3px 0;">
      <table cellpadding="0" cellspacing="0" border="0"><tr>
        <td style="vertical-align:middle;padding-right:8px;line-height:0;">
          <!--/* phone icon SVG */-->
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#777777" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </td>
        <td style="vertical-align:middle;">
          <a href="tel:+19174003123" style="font-size:13px;color:#333333;text-decoration:none;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">917.400.3123</a>
        </td>
      </tr></table>
    </td>
  </tr>

  <!-- ─── Email ─── -->
  <tr>
    <td style="padding:3px 0;">
      <table cellpadding="0" cellspacing="0" border="0"><tr>
        <td style="vertical-align:middle;padding-right:8px;line-height:0;">
          <!--/* email icon SVG */-->
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#777777" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </td>
        <td style="vertical-align:middle;">
          <a href="mailto:max@maxaec.com" style="font-size:13px;color:#333333;text-decoration:none;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">max@maxaec.com</a>
        </td>
      </tr></table>
    </td>
  </tr>

  <!-- ─── Website ─── -->
  <tr>
    <td style="padding:3px 0 0 0;">
      <table cellpadding="0" cellspacing="0" border="0"><tr>
        <td style="vertical-align:middle;padding-right:8px;line-height:0;">
          <!--/* globe icon SVG */-->
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#777777" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
        </td>
        <td style="vertical-align:middle;">
          <a href="https://www.maxaec.com" style="font-size:13px;color:#333333;text-decoration:none;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">www.maxaec.com</a>
        </td>
      </tr></table>
    </td>
  </tr>

  <!-- ─── Divider ─── -->
  <tr>
    <td style="padding:16px 0 16px 0;">
      <table cellpadding="0" cellspacing="0" border="0" width="100%"><tr>
        <td style="border-top:1px solid #e0e0e0;font-size:0;line-height:0;">&nbsp;</td>
      </tr></table>
    </td>
  </tr>

  <!-- ─── Logo lockup  (mark | divider | wordmark) ─── -->
  <tr>
    <td style="padding:0 0 8px 0;">
      <a href="https://www.maxaec.com" style="text-decoration:none;">
        <img src="lockup.svg" alt="MAX AEC LLC" width="199" height="36" style="display:block;border:0;" />
      </a>
    </td>
  </tr>

  <!-- ─── Tagline ─── -->
  <tr>
    <td style="padding:0;">
      <span style="font-size:8px;font-weight:400;color:#777777;letter-spacing:0.5px;text-transform:uppercase;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">Architecture · Engineering · Consulting</span>
    </td>
  </tr>

</table>
<!-- ── /Email Signature ── -->

</body>
</html>
