<!DOCTYPE html>
<html>
<head><title>PNG Preview</title></head>
<body style="background:#fff;padding:40px;font-family:sans-serif">
<h2>Icons (14px display, 28px @2x)</h2>
<div style="display:flex;gap:20px;align-items:center">
  <div><img src="icon-phone.png" width="14" height="14" style="border:1px solid #ccc"> phone</div>
  <div><img src="icon-email.png" width="14" height="14" style="border:1px solid #ccc"> email</div>
  <div><img src="icon-globe.png" width="14" height="14" style="border:1px solid #ccc"> globe</div>
</div>
<h2>Lockup (199×36 display, 398×72 @2x)</h2>
<div style="border:1px solid #ccc;display:inline-block">
  <img src="lockup.png" width="199" height="36">
</div>
<h2>Full size lockup (no scaling)</h2>
<div style="border:1px solid #ccc;display:inline-block">
  <img src="lockup.png">
</div>
</body>
</html>
