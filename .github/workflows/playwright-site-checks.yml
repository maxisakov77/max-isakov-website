name: Playwright Site Checks

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  local_checks:
    name: Local Site Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run local Playwright checks
        run: npm run test:site:ci

      - name: Upload local artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-local-artifacts
          path: output/playwright/**
          if-no-files-found: warn

  prod_monitor:
    name: Production Monitor
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run production Playwright checks
        env:
          BASE_URL: https://www.maxaec.com
        run: npm run test:site:ci

      - name: Upload production artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-production-artifacts
          path: output/playwright/**
          if-no-files-found: warn
